{% extends "base.html" %}

{% block title %}Browse Quotas{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body p-5">
                <h3 class="mb-4">Browse All Quotas</h3>
                <p class="text-muted mb-4">Select a quota to view its full dashboard.</p>

                {% if quotas %}
                <div class="mb-3">
                    <select id="quotaSelect" class="form-select form-select-lg">
                        <option value="" disabled selected>— Select a quota —</option>
                        {% for q in quotas %}
                        <option value="/admin/quota/{{ q.id }}">
                            {{ q.name }} ({{ q.path }}) — {{ q.usage_pct }}%
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="d-grid">
                    <button id="viewBtn" class="btn btn-primary btn-lg" disabled onclick="goToQuota()">
                        View Dashboard
                    </button>
                </div>
                {% else %}
                <p class="text-muted">No quotas found.</p>
                {% endif %}

                <div class="mt-4">
                    <a href="/dashboard" class="btn btn-outline-secondary">← Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const select = document.getElementById('quotaSelect');
    const btn = document.getElementById('viewBtn');

    select.addEventListener('change', function () {
        btn.disabled = !this.value;
    });

    function goToQuota() {
        const val = document.getElementById('quotaSelect').value;
        if (val) window.location = val;
    }
</script>
{% endblock %}
